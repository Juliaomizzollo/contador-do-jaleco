<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Projeto Jaleco</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>

    body{
      background:
      radial-gradient(circle at top, #172554 0%, #020617 60%);
      min-height:100vh;
      overflow-x:hidden;
      color:white;
      font-family:Arial, sans-serif;
    }

    .glass{
      background:rgba(255,255,255,0.05);
      backdrop-filter:blur(18px);
      border:1px solid rgba(255,255,255,0.1);
    }

    .glow{
      box-shadow:0 0 35px rgba(59,130,246,0.18);
    }

    .star{
      position:fixed;
      width:2px;
      height:2px;
      background:white;
      border-radius:50%;
      opacity:0.5;
      animation:twinkle infinite alternate;
    }

    @keyframes twinkle{
      from{opacity:0.2;}
      to{opacity:1;}
    }

    .particle{
      position:absolute;
      width:6px;
      height:6px;
      background:#38bdf8;
      border-radius:50%;
      opacity:0.5;
      animation:floatUp 5s linear infinite;
    }

    @keyframes floatUp{
      from{
        transform:translateY(0px);
        opacity:0;
      }

      20%{
        opacity:0.8;
      }

      to{
        transform:translateY(-120px);
        opacity:0;
      }
    }

  </style>
</head>

<body class="p-4 md:p-8">

<div id="particles"></div>

<div class="max-w-7xl mx-auto grid lg:grid-cols-4 gap-6">

  <!-- SIDEBAR -->

  <div class="glass rounded-3xl p-5 glow h-fit">

    <h1 class="text-4xl font-light leading-tight">
      🩺<br>
      PROJETO<br>
      JALECO
    </h1>

    <p id="frase"
      class="text-blue-200 italic mt-4 leading-relaxed">
    </p>

    <!-- STATUS -->

    <div class="mt-8">

      <h2 class="text-xl mb-4 text-cyan-300">
        🚀 Status
      </h2>

      <div id="statusAtual"
        class="text-3xl font-light">
      </div>

    </div>

    <!-- STREAK -->

    <div class="mt-8">

      <h2 class="text-xl mb-4 text-cyan-300">
        🔥 Streak
      </h2>

      <div id="streak"
        class="text-5xl font-light">
        0
      </div>

      <p class="text-white/60">
        dias seguidos
      </p>

    </div>

    <!-- COUNTDOWN -->

    <div class="mt-8">

      <h2 class="text-xl mb-4 text-cyan-300">
        ⏳ EXATO
      </h2>

      <div id="countdown"
        class="text-4xl font-light">
      </div>

      <p class="text-white/60">
        dias restantes
      </p>

    </div>

  </div>

  <!-- MAIN -->

  <div class="lg:col-span-2 space-y-6">

    <!-- CONTADOR -->

    <div class="glass rounded-3xl p-8 text-center glow">

      <p class="uppercase tracking-[0.4em] text-blue-200 text-sm">
        QUESTÕES RESOLVIDAS
      </p>

      <h2 id="contador"
        class="text-7xl font-light mt-3">
      </h2>

      <p
        id="metaTexto"
        class="text-cyan-300 mt-4 text-lg">
      </p>

      <div class="w-full h-5 bg-white/10 rounded-full mt-6 overflow-hidden">

        <div id="barra"
          class="h-full bg-gradient-to-r from-cyan-400 to-blue-600 transition-all duration-700">
        </div>

      </div>

    </div>

    <!-- CENTRO VISUAL -->

    <div class="glass rounded-3xl p-10 glow flex flex-col items-center justify-center min-h-[420px]">

      <div class="text-[12rem] opacity-20 animate-pulse">
        🩺
      </div>

      <p id="fraseCentral"
        class="mt-6 text-blue-100 italic text-center text-lg max-w-xl">
      </p>

    </div>

    <!-- GRÁFICO -->

    <div class="glass rounded-3xl p-6 glow">

      <h2 class="text-2xl mb-6 text-cyan-300">
        📈 Últimos 7 dias
      </h2>

      <div id="weeklyChart"
        class="flex items-end justify-between h-64 gap-2">
      </div>

    </div>

  </div>

  <!-- RIGHT -->

  <div class="lg:col-span-1 space-y-6">

    <!-- REGISTRAR -->

    <div class="glass rounded-3xl p-6 glow">

      <h2 class="text-2xl mb-5">
        ✍️ Registrar
      </h2>

      <input
        id="inputQuestoes"
        type="number"
        placeholder="Quantas questões?"
        class="w-full bg-black/30 p-4 rounded-2xl mb-4"
      >

      <select
        id="materia"
        class="w-full bg-black/30 p-4 rounded-2xl mb-4">

        <option>Matemática</option>
        <option>Física</option>
        <option>Química</option>
        <option>Biologia</option>
        <option>História</option>
        <option>Geografia</option>
        <option>Sociologia/Filosofia</option>
        <option>Linguagens</option>

      </select>

      <button
        onclick="adicionarQuestoes()"
        class="w-full bg-gradient-to-r from-cyan-500 to-blue-600 p-4 rounded-2xl hover:scale-105 transition">

        Adicionar

      </button>

    </div>

    <!-- MATÉRIAS -->

    <div class="glass rounded-3xl p-6 glow">

      <h2 class="text-2xl mb-6 text-cyan-300">
        📊 Matérias
      </h2>

      <div id="materiasChart"
        class="space-y-5">
      </div>

    </div>

    <!-- EVOLUÇÃO -->

    <div class="glass rounded-3xl p-6 glow">

      <h2 class="text-2xl mb-6 text-cyan-300">
        🌌 Evolução
      </h2>

      <div id="niveis"
        class="space-y-3">
      </div>

    </div>

  </div>

</div>

<script>

const frases = [

"Consistência constrói aprovação.",

"Você não precisa ser perfeita. Precisa continuar tentando.",

"Tanta questão que Cristina Yang ficaria orgulhosa!",

"Existem dois tipos de dores: a dor da disciplina e a dor do arrependimento. Escolha a sua.",

"Seu sonho merece disciplina.",

"Seu consultório na Neurologia está te esperando. E você, está lutando por ele?",

"Ou você sacrifica pelo seu sonho ou seu sonho se torna o sacrifício.",

"O impossível só demora um pouco mais.",

"A diferença entre quem passa e quem fracassa é somente o fato de que um deles escolheu não desistir.",

"Seu nome já pertence a esse jaleco.",

"Desistir não está no seu vocabulário!",

"Sonhe alto. Seu Deus é maior que seus sonhos.",

"Você está mais perto do que imagina.",

"Disciplina também é uma forma de fé.",

"A aprovação é construída nos dias comuns.",

"Pequenos esforços repetidos criam futuros gigantes.",

"Deus não desperdiça processos.",

"Uma questão de cada vez. Um dia de cada vez.",

"Grandes sonhos exigem constância silenciosa.",

"Você não chegou até aqui para parar agora.",

"Deus já reservou sua vaga em medicina.",

"Estude hoje como a médica que você quer se tornar.",

"Dra Julia, já fez quantas questões hoje?",

"Leia Josué 1:9, pega um cafézinho e vem fazer questão!",

"Estudar hoje é honrar quem você quer se tornar."

];

const niveis = [

["Interna",500],
["Plantonista",800],
["Residente",1500],
["R2",2500],
["R3",4000],
["Futura Dra.",10000],
["Médica Excepcional",25000],
["Doutora",50000],
["Lendária",100000],
["Imparável",1000000]

];

const materias = {

"Matemática":"#38bdf8",
"Física":"#8b5cf6",
"Química":"#22c55e",
"Biologia":"#facc15",
"História":"#f97316",
"Geografia":"#14b8a6",
"Sociologia/Filosofia":"#ec4899",
"Linguagens":"#a855f7"

};

let total =
Number(localStorage.getItem("totalQuestoes")) || 0;

let dadosMaterias =
JSON.parse(localStorage.getItem("dadosMaterias")) ||

{

"Matemática":0,
"Física":0,
"Química":0,
"Biologia":0,
"História":0,
"Geografia":0,
"Sociologia/Filosofia":0,
"Linguagens":0

};

let historico =
JSON.parse(localStorage.getItem("historico")) || [];

const fraseDoDia =
frases[
new Date().getDate() % frases.length
];

document.getElementById("frase").innerText =
fraseDoDia;

document.getElementById("fraseCentral").innerText =
fraseDoDia;

function atualizarTela(){

document.getElementById("contador").innerText =
total.toLocaleString();

let progresso =
Math.min((total/1000000)*100,100);

const metaTexto =
document.getElementById("metaTexto");

if(total < 4000){

metaTexto.innerText =
`Faltam ${(4000-total).toLocaleString()} questões para a meta.`;

}

else if(total === 4000){

metaTexto.innerText =
"🩺 META ATINGIDA.";

}

else{

metaTexto.innerText =
`${(total-4000).toLocaleString()} questões além da meta inicial.`;

}

document.getElementById("barra").style.width =
progresso + "%";

localStorage.setItem(
"totalQuestoes",
total
);

renderizarStatus();
renderizarNiveis();
renderizarMaterias();
renderizarGrafico();
renderizarCountdown();

}

function adicionarQuestoes(){

let qtd =
Number(document.getElementById("inputQuestoes").value);

let materia =
document.getElementById("materia").value;

if(!qtd || qtd<=0)return;

total += qtd;

dadosMaterias[materia]+=qtd;

let hoje =
new Date().toISOString().split("T")[0];

historico.push({

data:hoje,
quantidade:qtd,
materia:materia

});

localStorage.setItem(
"dadosMaterias",
JSON.stringify(dadosMaterias)
);

localStorage.setItem(
"historico",
JSON.stringify(historico)
);

document.getElementById("inputQuestoes").value="";

calcularStreak();
atualizarTela();

}

function renderizarStatus(){

let atual="Interna";

for(let nivel of niveis){

if(total>=nivel[1]){

atual=nivel[0];

}

}

document.getElementById("statusAtual").innerText =
atual;

}

function renderizarNiveis(){

const container =
document.getElementById("niveis");

container.innerHTML="";

niveis.forEach(nivel=>{

let ativo =
total>=nivel[1];

container.innerHTML += `

<div class="
p-3 rounded-2xl
${ativo ?
'bg-cyan-500/20 border border-cyan-400'
:
'bg-white/5'}
">

<div class="flex justify-between">

<span>${nivel[0]}</span>

<span>${nivel[1].toLocaleString()}+</span>

</div>

</div>

`;

});

}

function renderizarMaterias(){

const container =
document.getElementById("materiasChart");

container.innerHTML="";

let maior =
Math.max(...Object.values(dadosMaterias),1);

for(let materia in dadosMaterias){

let valor =
dadosMaterias[materia];

let largura =
(valor/maior)*100;

container.innerHTML += `

<div>

<div class="flex justify-between mb-1">

<span>${materia}</span>

<span>${valor}</span>

</div>

<div class="w-full h-4 bg-white/10 rounded-full overflow-hidden">

<div
style="
width:${largura}%;
background:${materias[materia]};
height:100%;
box-shadow:0 0 15px ${materias[materia]};
">
</div>

</div>

</div>

`;

}

}

function renderizarGrafico(){

const chart =
document.getElementById("weeklyChart");

chart.innerHTML="";

let dias = [];

for(let i=6;i>=0;i--){

let d = new Date();

d.setDate(d.getDate()-i);

dias.push(
d.toISOString().split("T")[0]
);

}

let dadosDias = dias.map(dia=>{

return historico
.filter(item=>item.data===dia)
.reduce((acc,item)=>acc+item.quantidade,0);

});

let maior =
Math.max(...dadosDias,1);

dadosDias.forEach((valor)=>{

let altura =
(valor/maior)*180;

chart.innerHTML += `

<div class="flex flex-col items-center w-full">

<div
class="w-full rounded-t-2xl"
style="
height:${altura}px;
background:linear-gradient(to top,#38bdf8,#2563eb);
box-shadow:0 0 20px rgba(56,189,248,0.5);
">
</div>

<p class="mt-3 text-sm text-white/60">
${valor}
</p>

</div>

`;

});

}

function renderizarCountdown(){

let prova =
new Date("2026-10-18");

let hoje =
new Date();

let diff =
prova-hoje;

let dias =
Math.ceil(diff/(1000*60*60*24));

document.getElementById("countdown")
.innerText=dias;

}

function calcularStreak(){

let dias = [...new Set(
historico.map(item=>item.data)
)].sort().reverse();

if(dias.length===0){

document.getElementById("streak")
.innerText = 0;

return;

}

let streak = 0;

let atual = new Date();

for(let dia of dias){

let dataDia = new Date(dia);

let diff =
Math.floor(
(atual - dataDia)
/(1000*60*60*24)
);

if(diff===streak){

streak++;

atual.setDate(atual.getDate()-1);

}else{

break;

}

}

document.getElementById("streak")
.innerText = streak;

}

for(let i=0;i<120;i++){

let star =
document.createElement("div");

star.classList.add("star");

star.style.left =
Math.random()*100 + "vw";

star.style.top =
Math.random()*100 + "vh";

star.style.animationDuration =
(Math.random()*5+2)+"s";

document.body.appendChild(star);

}

for(let i=0;i<30;i++){

let p =
document.createElement("div");

p.classList.add("particle");

p.style.left =
(Math.random()*100)+"vw";

p.style.bottom =
(Math.random()*40)+"px";

p.style.animationDelay =
(Math.random()*5)+"s";

document.body.appendChild(p);

}

calcularStreak();
atualizarTela();

</script>

</body>
</html>
